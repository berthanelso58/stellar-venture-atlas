# Render deployment config for Stellar Venture Atlas (Starfield)
#
# Database is pre-provisioned on Render (free tier, expires ~30 days from creation).
# Go to https://dashboard.render.com/d/dpg-d8jujrm47okc73eapc30-a to copy the full
# "Internal Database URL" (includes password). Add it as DATABASE_URL env var
# to the web service after creation (or link the DB in dashboard).
#
# How to deploy:
# 1. Push this code to GitHub (the repo https://github.com/berthanelso58/stellar-venture-atlas was created for you).
# 2. In Render dashboard: New > Blueprint Instance, connect the GitHub repo.
#    It will read this file and deploy the web service (single service serving both
#    the React frontend via SERVE_FRONTEND and the Express API).
# 3. After deploy, add the DATABASE_URL from the DB dashboard to the service env vars.
#
# Manual alternative: Create a Node web service from the repo with the build/start
# commands below + set DATABASE_URL.

services:
  - type: web
    name: stellar-venture-atlas
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: |
      npm install -g pnpm@9
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/starfield run build
      pnpm --filter @workspace/api-server run build
      # Note: pnpm@9 via npm -g avoids EROFS when trying to manage /usr/bin/pnpm on Render's read-only FS.
      # Do not use "corepack enable" here.
    startCommand: pnpm --filter @workspace/db run push || true; SERVE_FRONTEND=1 pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "1"
      # Add DATABASE_URL (full postgres://... from the stellar-venture-atlas-db dashboard)
      # You can also link the pre-created DB in the Render service settings.
