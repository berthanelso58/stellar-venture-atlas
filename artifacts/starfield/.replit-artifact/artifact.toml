kind = "web"
previewPath = "/"
title = "Starfield — Company Game"
version = "1.0.0"
id = "artifacts/starfield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21575

[services.development]
run = "pnpm --filter @workspace/starfield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/starfield", "run", "build" ]
publicDir = "artifacts/starfield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21575"
BASE_PATH = "/"
