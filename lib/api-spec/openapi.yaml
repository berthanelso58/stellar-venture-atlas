openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Starfield Company Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: games
    description: Game management
  - name: players
    description: Player management
  - name: celestial
    description: Celestial bodies (Moon, Sun goals)
  - name: milestones
    description: Milestones on the earth
  - name: tasks
    description: Tasks as steps to milestones
  - name: risks
    description: Risks as carnivores
  - name: kpis
    description: KPI metrics
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /games:
    get:
      operationId: listGames
      tags: [games]
      summary: List all games
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
    post:
      operationId: createGame
      tags: [games]
      summary: Create a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{gameId}:
    get:
      operationId: getGame
      tags: [games]
      summary: Get a game by ID
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
    patch:
      operationId: updateGame
      tags: [games]
      summary: Update a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
    delete:
      operationId: deleteGame
      tags: [games]
      summary: Delete a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players in a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Add a player to a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /games/{gameId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Remove a player
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/celestial:
    get:
      operationId: listCelestialBodies
      tags: [celestial]
      summary: List celestial bodies for a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of celestial bodies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CelestialBody"
    post:
      operationId: createCelestialBody
      tags: [celestial]
      summary: Create a celestial body (Moon/Sun goal)
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CelestialBodyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CelestialBody"

  /games/{gameId}/celestial/{celestialId}:
    patch:
      operationId: updateCelestialBody
      tags: [celestial]
      summary: Update a celestial body
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: celestialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CelestialBodyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CelestialBody"
    delete:
      operationId: deleteCelestialBody
      tags: [celestial]
      summary: Delete a celestial body
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: celestialId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones on the earth
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /games/{gameId}/milestones/{milestoneId}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update a milestone
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: milestoneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a milestone
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: milestoneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks in a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /games/{gameId}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/risks:
    get:
      operationId: listRisks
      tags: [risks]
      summary: List risks (carnivores) in a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Risk"
    post:
      operationId: createRisk
      tags: [risks]
      summary: Create a risk (carnivore)
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"

  /games/{gameId}/risks/{riskId}:
    patch:
      operationId: updateRisk
      tags: [risks]
      summary: Update a risk
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: riskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"
    delete:
      operationId: deleteRisk
      tags: [risks]
      summary: Delete a risk
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: riskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/kpis:
    get:
      operationId: listKpis
      tags: [kpis]
      summary: List KPIs for a game
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of KPIs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kpi"
    post:
      operationId: createKpi
      tags: [kpis]
      summary: Create a KPI
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kpi"

  /games/{gameId}/kpis/{kpiId}:
    patch:
      operationId: updateKpi
      tags: [kpis]
      summary: Update a KPI
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: kpiId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kpi"
    delete:
      operationId: deleteKpi
      tags: [kpis]
      summary: Delete a KPI
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: kpiId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{gameId}/kpis/{kpiId}/entries:
    get:
      operationId: listKpiEntries
      tags: [kpis]
      summary: List daily KPI entries
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: kpiId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KpiEntry"
    post:
      operationId: createKpiEntry
      tags: [kpis]
      summary: Log a daily KPI value
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
        - name: kpiId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiEntry"

  /games/{gameId}/dashboard:
    get:
      operationId: getGameDashboard
      tags: [dashboard]
      summary: Get full game dashboard summary
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Game:
      type: object
      required: [id, name, mission, playerCount, createdAt]
      properties:
        id:
          type: integer
        parentGameId:
          type: ["integer", "null"]
          description: If set, this is a sub-game of the referenced game
        name:
          type: string
        mission:
          type: string
          description: The North Star — mission statement
        description:
          type: ["string", "null"]
        playerCount:
          type: integer
        notionDatabaseId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GameInput:
      type: object
      required: [name, mission, playerCount]
      properties:
        parentGameId:
          type: integer
          description: Optional parent game ID to create a sub-game
        name:
          type: string
          minLength: 1
        mission:
          type: string
          minLength: 1
        description:
          type: string
        playerCount:
          type: integer
          minimum: 1
          maximum: 20
        notionDatabaseId:
          type: string

    GameUpdate:
      type: object
      properties:
        parentGameId:
          type: ["integer", "null"]
        name:
          type: string
        mission:
          type: string
        description:
          type: string
        playerCount:
          type: integer
        notionDatabaseId:
          type: string

    Player:
      type: object
      required: [id, gameId, name, role, avatarColor, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        name:
          type: string
        role:
          type: string
        avatarColor:
          type: string
        createdAt:
          type: string
          format: date-time

    PlayerInput:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
        avatarColor:
          type: string

    PlayerUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        avatarColor:
          type: string

    CelestialBody:
      type: object
      required: [id, gameId, type, label, description, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        playerId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [moon, sun, star, comet]
        label:
          type: string
        description:
          type: string
        targetDate:
          type: ["string", "null"]
        progress:
          type: integer
          description: 0-100 progress percent
        createdAt:
          type: string
          format: date-time

    CelestialBodyInput:
      type: object
      required: [type, label, description]
      properties:
        playerId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [moon, sun, star, comet]
        label:
          type: string
          minLength: 1
        description:
          type: string
        targetDate:
          type: string
        progress:
          type: integer

    CelestialBodyUpdate:
      type: object
      properties:
        label:
          type: string
        description:
          type: string
        targetDate:
          type: string
        progress:
          type: integer

    Milestone:
      type: object
      required: [id, gameId, title, status, starsValue, positionX, positionY, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [planted, growing, blooming, harvested]
        starsValue:
          type: integer
          description: Value in stars (1-5)
        positionX:
          type: number
          description: X position on earth canvas (0-100)
        positionY:
          type: number
          description: Y position on earth canvas (0-100)
        targetDate:
          type: ["string", "null"]
        plannedStartDate:
          type: ["string", "null"]
          description: Planned start date (ISO 8601)
        plannedEndDate:
          type: ["string", "null"]
          description: Planned end date (ISO 8601)
        actualStartDate:
          type: ["string", "null"]
          description: Actual start date (ISO 8601)
        actualEndDate:
          type: ["string", "null"]
          description: Actual end date (ISO 8601)
        taskCount:
          type: ["integer", "null"]
        completedTaskCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    MilestoneInput:
      type: object
      required: [title, starsValue]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        starsValue:
          type: integer
          minimum: 1
          maximum: 5
        positionX:
          type: number
        positionY:
          type: number
        targetDate:
          type: string
        plannedStartDate:
          type: string
        plannedEndDate:
          type: string
        actualStartDate:
          type: string
        actualEndDate:
          type: string

    MilestoneUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planted, growing, blooming, harvested]
        starsValue:
          type: integer
        positionX:
          type: number
        positionY:
          type: number
        targetDate:
          type: string
        plannedStartDate:
          type: ["string", "null"]
        plannedEndDate:
          type: ["string", "null"]
        actualStartDate:
          type: ["string", "null"]
        actualEndDate:
          type: ["string", "null"]

    Task:
      type: object
      required: [id, gameId, title, status, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        milestoneId:
          type: ["integer", "null"]
        assignedPlayerId:
          type: ["integer", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [plan, doing, check, next_plan]
          description: "Kanban stages: plan=Plan, doing=Doing, check=Review KPI + Residual Close, next_plan=Next Plan"
        priority:
          type: string
          enum: [low, medium, high, critical]
        kpiImpact:
          type: ["string", "null"]
          description: Which KPI this task impacts
        dueDate:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TaskInput:
      type: object
      required: [title]
      properties:
        milestoneId:
          type: ["integer", "null"]
        assignedPlayerId:
          type: ["integer", "null"]
        title:
          type: string
          minLength: 1
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        kpiImpact:
          type: string
        dueDate:
          type: string

    TaskUpdate:
      type: object
      properties:
        milestoneId:
          type: ["integer", "null"]
        assignedPlayerId:
          type: ["integer", "null"]
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [plan, doing, check, next_plan]
        priority:
          type: string
          enum: [low, medium, high, critical]
        kpiImpact:
          type: string
        dueDate:
          type: string

    Risk:
      type: object
      required: [id, gameId, name, severity, status, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        name:
          type: string
          description: The carnivore label
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [lurking, stalking, charging, tamed]
        likelihood:
          type: integer
          description: 1-5 likelihood stars
        impact:
          type: integer
          description: 1-5 impact stars
        status:
          type: string
          enum: [active, mitigated, eliminated]
        mitigationPlan:
          type: ["string", "null"]
        positionX:
          type: ["number", "null"]
        positionY:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    RiskInput:
      type: object
      required: [name, severity]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        severity:
          type: string
          enum: [lurking, stalking, charging, tamed]
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        impact:
          type: integer
          minimum: 1
          maximum: 5
        mitigationPlan:
          type: string
        positionX:
          type: number
        positionY:
          type: number

    RiskUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [lurking, stalking, charging, tamed]
        likelihood:
          type: integer
        impact:
          type: integer
        status:
          type: string
          enum: [active, mitigated, eliminated]
        mitigationPlan:
          type: string
        positionX:
          type: number
        positionY:
          type: number

    Kpi:
      type: object
      required: [id, gameId, name, unit, target, current, createdAt]
      properties:
        id:
          type: integer
        gameId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        unit:
          type: string
        target:
          type: number
        current:
          type: number
        milestoneId:
          type: ["integer", "null"]
        linkedTaskIds:
          type: array
          items:
            type: integer
        trend:
          type: ["string", "null"]
          enum: [up, down, flat, null]
        createdAt:
          type: string
          format: date-time

    KpiInput:
      type: object
      required: [name, unit, target]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        unit:
          type: string
        target:
          type: number
        milestoneId:
          type: ["integer", "null"]

    KpiUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        unit:
          type: string
        target:
          type: number
        current:
          type: number
        milestoneId:
          type: ["integer", "null"]

    KpiEntry:
      type: object
      required: [id, kpiId, value, date, createdAt]
      properties:
        id:
          type: integer
        kpiId:
          type: integer
        value:
          type: number
        note:
          type: ["string", "null"]
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    KpiEntryInput:
      type: object
      required: [value, date]
      properties:
        value:
          type: number
        note:
          type: string
        date:
          type: string
          format: date

    GameDashboard:
      type: object
      required: [game, players, milestoneProgress, taskStats, activeRisks, kpiSummary, recentActivity]
      properties:
        game:
          $ref: "#/components/schemas/Game"
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        milestoneProgress:
          type: object
          properties:
            total:
              type: integer
            harvested:
              type: integer
            blooming:
              type: integer
            growing:
              type: integer
            planted:
              type: integer
            totalStars:
              type: integer
          required: [total, harvested, blooming, growing, planted, totalStars]
        taskStats:
          type: object
          properties:
            total:
              type: integer
            done:
              type: integer
            blooming:
              type: integer
            sprouting:
              type: integer
            seed:
              type: integer
          required: [total, done, blooming, sprouting, seed]
        activeRisks:
          type: array
          items:
            $ref: "#/components/schemas/Risk"
        kpiSummary:
          type: array
          items:
            type: object
            required: [kpi, latestValue, progressPercent]
            properties:
              kpi:
                $ref: "#/components/schemas/Kpi"
              latestValue:
                type: ["number", "null"]
              progressPercent:
                type: number
        recentActivity:
          type: array
          items:
            type: object
            required: [type, title, timestamp]
            properties:
              type:
                type: string
              title:
                type: string
              timestamp:
                type: string
                format: date-time
