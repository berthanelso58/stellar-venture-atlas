version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: starfield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: starfield_dev
    ports:
      - "5432:5432"
    volumes:
      - starfield_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d starfield_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional lightweight database UI (like a simple Replit DB viewer)
  # Access at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: starfield-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  starfield_pgdata:
